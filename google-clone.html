
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Clone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      flex-direction:column;
      background:white;
    }
    header{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:15px 25px;
      gap:18px;
      font-size:14px;
    }

    header a{
      text-decoration:none;
      color:#202124;
    }

    header a:hover{
      text-decoration:underline;
    }

    .profile{
      width:35px;
      height:35px;
      border-radius:50%;
      background:#7c3aed;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      cursor:pointer;
    }
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
      margin-top:-80px;
    }
    .logo{
  font-size:92px;
  font-weight:500;
  font-family:Arial, sans-serif;
  margin-bottom:30px;
}

    .blue{
      color:#4285F4;
    }

    .red{
      color:#EA4335;
    }

    .yellow{
      color:#FBBC05;
    }

    .green{
      color:#34A853;
    }
    .search-box{
      width:100%;
      max-width:580px;
      border:1px solid #dcdcdc;
      border-radius:30px;
      display:flex;
      align-items:center;
      padding:12px 20px;
      box-shadow:0 1px 6px rgba(32,33,36,0.1);
      transition:0.3s;
    }

    .search-box:hover{
      box-shadow:0 2px 10px rgba(32,33,36,0.2);
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
      padding:5px 10px;
    }

    .icon{
      color:gray;
      font-size:18px;
    }

    .buttons{
      margin-top:30px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .buttons button{
      padding:10px 18px;
      border:none;
      background:#f8f9fa;
      border-radius:4px;
      cursor:pointer;
      font-size:14px;
      border:1px solid transparent;
    }

    .buttons button:hover{
      border:1px solid #dadce0;
      box-shadow:0 1px 2px rgba(0,0,0,0.1);
    }

    footer{
      background:#f2f2f2;
      padding:15px 30px;
      font-size:14px;
      color:#70757a;
    }

    .footer-links{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }

    .footer-left,
    .footer-right{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    footer a{
      text-decoration:none;
      color:#70757a;
    }

    footer a:hover{
      text-decoration:underline;
    }

    @media(max-width:600px){

      .logo{
        font-size:65px;
      }

      .search-box{
        max-width:95%;
      }

      .footer-links{
        flex-direction:column;
        align-items:center;
      }

      .footer-left,
      .footer-right{
        justify-content:center;
      }
    }

  </style>
</head>

<body>


  <header>
    <a href="#">Gmail</a>
    <a href="#">Images</a>

    <div class="profile">
      M
    </div>
  </header>


  <div class="main">


    <div class="logo">
      <div class="logo"><span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span></div>
    </div>


    <div class="search-box">

      <span class="icon">🔍</span>

      <input type="text" placeholder="Search Google or type a URL">

      <span class="icon">🎤</span>

    </div>


    <div class="buttons">

      <button>Google Search</button>

      <button>I'm Feeling Lucky</button>

    </div>

  </div>


  <footer>

    <div class="footer-links">

      <div class="footer-left">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>

      <div class="footer-right">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>

    </div>

  </footer>

</body>
</html>
